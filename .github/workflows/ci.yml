name: StatTerrain CI

on:
  push:
    branches: [main]
    paths:
      - "statterrain/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "statterrain/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: statterrain

jobs:
  build-and-test:
    name: Lint, typecheck, build, and e2e smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: statterrain/package-lock.json

      - name: Upgrade npm (workaround for npm 10.8.2 "Exit handler never called" bug)
        run: npm install -g npm@10.9.2

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: statterrain/playwright-report/
          retention-days: 14
