name: ACS County Population National Build
on:
  workflow_dispatch:
    inputs:
      target_branch: { description: Target branch, required: true }
      acs_release: { description: ACS release, required: true, default: "2024" }
      build_mode: { description: probe, selected-states, national, required: true, default: national }
      selected_states: { description: Comma-separated state codes for selected-states, required: false, default: "" }
      commit_generated_artifacts: { description: Commit generated artifacts, required: true, default: "true" }
      auto_merge: { description: Must remain false, required: true, default: "false" }
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: write, pull-requests: write }
    env:
      CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
      ACS_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      ACS_STAGING_ROOT: statterrain/data/work/acs-county-population/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Refuse protected target branches
        run: |
          if [ "${{ inputs.target_branch }}" = "main" ] || [ "${{ inputs.target_branch }}" = "master" ]; then echo "::error::Refusing to commit generated ACS artifacts to main/master."; exit 1; fi
          if [ "${{ inputs.auto_merge }}" != "false" ]; then echo "::error::auto_merge is not supported."; exit 1; fi
      - uses: actions/checkout@v4
        with: { ref: "${{ inputs.target_branch }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: npm, cache-dependency-path: statterrain/package-lock.json }
      - name: Install dependencies
        working-directory: statterrain
        run: npm ci
      - name: Initialize current-run status
        working-directory: statterrain
        run: node scripts/public-data/acs-workflow-status.mjs init --run-id "$ACS_RUN_ID" --workflow-run-id "${{ github.run_id }}" --workflow-run-attempt "${{ github.run_attempt }}" --target-branch "${{ inputs.target_branch }}" --build-mode "${{ inputs.build_mode }}" --release "${{ inputs.acs_release }}"
      - name: Check Census API credential
        working-directory: statterrain
        run: |
          if [ -z "$CENSUS_API_KEY" ]; then node scripts/public-data/acs-workflow-status.mjs update --field metadataValidationStatus --value "NOT RUN" --failure-stage credential --failure-message "CENSUS_API_KEY is not configured"; echo "::error::CENSUS_API_KEY is not configured."; exit 1; fi
          test -f package.json || { node scripts/public-data/acs-workflow-status.mjs update --field buildStatus --value "FAIL" --failure-stage app-directory --failure-message "statterrain directory missing"; exit 1; }
      - name: Validate live ACS metadata
        working-directory: statterrain
        run: |
          if npm run data:validate-acs-variable-metadata -- --release "${{ inputs.acs_release }}" --run-id "$ACS_RUN_ID"; then
            node scripts/public-data/acs-workflow-status.mjs update --field metadataValidationStatus --value PASS
          else
            node scripts/public-data/acs-workflow-status.mjs update --field metadataValidationStatus --value FAIL --failure-stage metadata --failure-message "ACS variable metadata validation failed"
            node scripts/public-data/acs-workflow-status.mjs update --field completionDeclaration --value "BLOCKED — ACS VARIABLE METADATA VALIDATION FAILED"
            exit 1
          fi
      - name: Probe API
        working-directory: statterrain
        run: |
          if npm run data:pull-acs-county-population -- --probe --release "${{ inputs.acs_release }}" --run-id "$ACS_RUN_ID" --output-root "data/work/acs-county-population/$ACS_RUN_ID/probe" --force; then node scripts/public-data/acs-workflow-status.mjs update --field probeStatus --value PASS; else node scripts/public-data/acs-workflow-status.mjs update --field probeStatus --value FAIL --failure-stage probe --failure-message "ACS API probe failed"; exit 1; fi
      - name: Build requested ACS county artifacts in staging
        working-directory: statterrain
        run: |
          MODE="--national"
          if [ "${{ inputs.build_mode }}" = "probe" ]; then MODE="--probe"; fi
          if [ "${{ inputs.build_mode }}" = "selected-states" ]; then MODE="--selected-states --states ${{ inputs.selected_states }}"; fi
          if npm run data:pull-acs-county-population -- $MODE --release "${{ inputs.acs_release }}" --run-id "$ACS_RUN_ID" --output-root "data/work/acs-county-population/$ACS_RUN_ID" --resume; then node scripts/public-data/acs-workflow-status.mjs update --field buildStatus --value PASS; else node scripts/public-data/acs-workflow-status.mjs update --field buildStatus --value FAIL --failure-stage build --failure-message "ACS county build failed"; exit 1; fi
      - name: Validate staging ACS artifacts
        working-directory: statterrain
        run: |
          if npm run data:validate-acs-county-population -- --output-root "data/work/acs-county-population/$ACS_RUN_ID"; then node scripts/public-data/acs-workflow-status.mjs update --field artifactValidationStatus --value PASS; else node scripts/public-data/acs-workflow-status.mjs update --field artifactValidationStatus --value FAIL --failure-stage artifact-validation --failure-message "ACS artifact validation failed"; exit 1; fi
      - name: Promote validated ACS artifacts
        working-directory: statterrain
        run: node scripts/public-data/acs-workflow-status.mjs promote
      - name: Evaluate commit gate
        working-directory: statterrain
        run: node scripts/public-data/acs-workflow-status.mjs gate --commit "${{ inputs.commit_generated_artifacts }}" --manifest "data/generated/acs-county-population-national/manifest.json"
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acs-county-population-build
          path: |
            statterrain/data/work/acs-county-population/${{ github.run_id }}-${{ github.run_attempt }}
            statterrain/data/generated/acs-county-population-national
            statterrain/data/generated/acs-county-population-fixture
            statterrain/data/reports/acs-county-variable-validation-v0.3.6.2.json
            statterrain/data/reports/acs-variable-metadata-regression-v0.3.6.2.json
            statterrain/data/reports/acs-county-current-run-status.json
            statterrain/data/reports/acs-*.json
      - name: Write truthful job summary
        if: always()
        working-directory: statterrain
        run: node scripts/public-data/acs-workflow-status.mjs summary --manifest "data/work/acs-county-population/$ACS_RUN_ID/manifest.json"
      - name: Commit generated artifacts
        if: ${{ inputs.commit_generated_artifacts == 'true' }}
        working-directory: statterrain
        run: |
          node scripts/public-data/acs-workflow-status.mjs gate --commit true --manifest "data/generated/acs-county-population-national/manifest.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated/acs-county-population-national data/reports/acs-*.json
          git commit -m "data: build national ACS county population baseline" || { echo "No generated changes to commit."; exit 0; }
          git push origin "${{ inputs.target_branch }}"
