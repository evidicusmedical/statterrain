name: ACS Variable Metadata Verification
on:
  workflow_dispatch:
    inputs:
      release: { description: ACS release, required: true, default: "2024" }
      target_branch: { description: Target branch, required: true, default: "main" }
jobs:
  verify:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    env:
      ACS_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ inputs.target_branch }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: npm, cache-dependency-path: statterrain/package-lock.json }
      - name: Install dependencies
        working-directory: statterrain
        run: npm ci
      - name: Run live ACS variable metadata validation
        working-directory: statterrain
        run: npm run data:validate-acs-variable-metadata -- --release "${{ inputs.release }}" --run-id "$ACS_RUN_ID"
      - name: Upload ACS metadata diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acs-variable-metadata-diagnostics-v0.3.6.2
          path: |
            statterrain/data/reports/acs-county-variable-validation-v0.3.6.2.json
            statterrain/data/reports/acs-variable-metadata-regression-v0.3.6.2.json
            statterrain/data/reports/acs-county-current-run-status.json
