name: CMS Hospital National Build

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Feature branch to check out and receive generated artifacts; main is refused.
        required: true
        default: v0.3.2.4-national-cms-hospital-generated-data
      build_mode:
        description: CMS hospital build mode. identity-refresh updates identity/contact fields while reusing the current geocoding cache.
        type: choice
        required: true
        default: identity-refresh
        options:
          - full
          - incremental
          - identity-refresh
      commit_generated_artifacts:
        description: Commit generated artifacts back to the target branch.
        type: boolean
        required: true
        default: true
      auto_merge:
        description: Reserved safety switch; auto-merge is not supported by this workflow.
        type: boolean
        required: true
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  APP_DIR: statterrain
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CMS_HOSPITAL_PAGE_SIZE: 1000

jobs:
  build-national-cms-hospitals:
    name: Build national CMS hospital artifacts
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target_branch != 'main' && github.event.inputs.target_branch != 'master' && github.event.inputs.auto_merge != 'true' }}
    steps:
      - name: Refuse protected branches and unsupported modes
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.target_branch }}" in
            main|master|refs/heads/main|refs/heads/master) echo "Refusing to run against protected branch" >&2; exit 1 ;;
          esac
          case "${{ github.event.inputs.build_mode }}" in full|incremental|identity-refresh) ;; *) echo "Unsupported build mode" >&2; exit 1 ;; esac
          test "${{ github.event.inputs.auto_merge }}" != "true"

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0

      - name: Refuse outdated target branch without pagination fix
        shell: bash
        run: |
          set -euo pipefail
          test -f statterrain/scripts/public-data/build-national-cms-hospitals.mjs
          grep -q "DEFAULT_CMS_PAGE_SIZE=1000" statterrain/scripts/public-data/build-national-cms-hospitals.mjs
          ! grep -q "limit=50000" statterrain/scripts/public-data/build-national-cms-hospitals.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: statterrain/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.APP_DIR }}

      - name: Probe CMS Hospital API
        id: cms_probe
        shell: bash
        run: |
          set -euo pipefail
          node scripts/public-data/build-national-cms-hospitals.mjs --probe > /tmp/cms-probe.json
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('/tmp/cms-probe.json','utf8'));
          if (data.status !== 200) throw new Error('CMS probe did not return 200');
          console.log(JSON.stringify(data, null, 2));
          "
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('fs');
          const probe = JSON.parse(fs.readFileSync('/tmp/cms-probe.json','utf8'));
          console.log(`success=true`);
          console.log(`status=${probe.status ?? ''}`);
          console.log(`recordArrayKey=${probe.recordArrayKey ?? ''}`);
          console.log(`rowCount=${probe.rowCount ?? ''}`);
          console.log(`reportedLimit=${probe.paginationMetadata?.limit ?? ''}`);
          console.log(`reportedCount=${probe.paginationMetadata?.count ?? ''}`);
          NODE
        working-directory: ${{ env.APP_DIR }}

      - name: Summarize pre-build diagnostics
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<MD
          ## CMS Hospital API Probe

          | Diagnostic | Value |
          | --- | --- |
          | CMS probe success | ${{ steps.cms_probe.outputs.success }} |
          | Response record-array key | ${{ steps.cms_probe.outputs.recordArrayKey }} |
          | Reported page-size metadata | ${{ steps.cms_probe.outputs.reportedLimit }} |
          | Reported count metadata | ${{ steps.cms_probe.outputs.reportedCount }} |
          | Configured national page size | ${{ env.CMS_HOSPITAL_PAGE_SIZE }} |
          | Target branch | ${{ github.event.inputs.target_branch }} |
          | Build mode | ${{ github.event.inputs.build_mode }} |
          MD

      - name: Build complete national CMS hospital network
        run: node scripts/public-data/build-national-cms-hospitals.mjs --build-mode=${{ github.event.inputs.build_mode }}
        working-directory: ${{ env.APP_DIR }}

      - name: Rebuild public data manifests
        run: |
          npm run data:build-coverage-manifest
          npm run data:build-artifact-manifest
        working-directory: ${{ env.APP_DIR }}


      - name: Upload interim national build artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: cms-hospital-national-build-${{ github.run_id }}-${{ github.run_attempt }}-interim
          retention-days: 14
          if-no-files-found: warn
          path: |
            statterrain/data/generated/cms-hospitals-national/**
            statterrain/data/generated/cms-hospitals-national-v0.3.2.json
            statterrain/data/normalized/cms-hospitals/**
            statterrain/data/generated/geocoding-inputs/**
            statterrain/data/generated/geocoding-cache/**
            statterrain/data/generated/geocoding-chunks/**
            statterrain/data/generated/geocoding-results/**
            statterrain/data/reports/**
            statterrain/data/generated/source-coverage-manifest.json
            statterrain/data/generated/artifact-manifest.json

      - name: Validate generated artifacts and app
        run: |
          npm run data:validate-sources
          npm run data:validate-benchmark
          npm run data:validate-cms-hospitals:national
          npm run data:validate-cms-dialysis
          npm run data:audit-cms-hospital-fields
          npm run lint
          npm run typecheck
          npm run build
        working-directory: ${{ env.APP_DIR }}


      - name: Upload final national validation artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: cms-hospital-national-build-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            statterrain/data/generated/cms-hospitals-national/manifest.json
            statterrain/data/generated/cms-hospitals-national/summary.json
            statterrain/data/generated/cms-hospitals-national/states/**
            statterrain/data/generated/cms-hospitals-national/excluded-records.json
            statterrain/data/generated/cms-hospitals-national/unmatched-records.json
            statterrain/data/generated/cms-hospitals-national-v0.3.2.json
            statterrain/data/normalized/cms-hospitals/cms-hospitals-normalized-v0.3.2.json
            statterrain/data/generated/geocoding-inputs/cms-hospitals-national-geocoding-input-v0.3.2.json
            statterrain/data/generated/geocoding-cache/cms-hospitals-geocoding-cache.json
            statterrain/data/generated/geocoding-chunks/cms-hospitals-v0.3.2/**
            statterrain/data/generated/geocoding-results/cms-hospitals-geography-join-v0.3.2.json
            statterrain/data/reports/cms-hospitals-geocoding-run-v0.3.2.json
            statterrain/data/reports/cms-hospitals-national-quality-v0.3.2.json
            statterrain/data/reports/cms-hospitals-national-validation-v0.3.2.4.json
            statterrain/data/reports/cms-hospitals-national-pull-v0.3.2.json
            statterrain/data/generated/source-coverage-manifest.json
            statterrain/data/generated/artifact-manifest.json

      - name: Capture national build summary
        if: ${{ success() }}
        id: summary
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('statterrain/data/generated/cms-hospitals-national/manifest.json','utf8'));
          const pull = JSON.parse(fs.readFileSync('statterrain/data/reports/cms-hospitals-national-pull-v0.3.2.json','utf8'));
          const run = JSON.parse(fs.readFileSync('statterrain/data/reports/cms-hospitals-geocoding-run-v0.3.2.json','utf8'));
          const qa = JSON.parse(fs.readFileSync('statterrain/data/reports/cms-hospitals-national-quality-v0.3.2.json','utf8'));
          const audit = JSON.parse(fs.readFileSync('statterrain/data/reports/cms-hospital-field-completeness-v0.3.4.json','utf8'));
          for (const [k,v] of Object.entries({buildMode: '${{ github.event.inputs.build_mode }}', pages: pull.pagesCompleted, raw: pull.rawRowsRetrieved ?? pull.rawRowCount, unique: pull.uniqueSourceIds ?? pull.uniqueSourceIdCount, normalized: pull.normalizedRows ?? pull.normalizedRecordCount, duplicates: pull.duplicateSourceIds ?? pull.duplicateSourceIdCount, complete: pull.paginationComplete, eligible: run.totalGeocodingEligible, cacheHits: run.cacheHits, chunks: `${run.chunksCompleted}/${run.chunksPlanned}`, matched: run.matchedRecords, unmatched: run.noMatchRecords, failed: run.failedRecords, joined: qa.geographyJoinedCount, mapReady: manifest.mapReadyRecords, excluded: manifest.excludedRecords, states: manifest.statesPresent.length, partitions: manifest.partitions.length, retrievedAt: manifest.retrievedAt, phone: audit.findings.phone.partitionCount, website: audit.findings.website.partitionCount, hospitalType: audit.findings.hospitalType.partitionCount, ownership: audit.findings.ownershipType.partitionCount, emergencyServices: audit.findings.emergencyServices.partitionCount, criticalAccess: audit.findings.criticalAccess.partitionCount, externalRequests: run.repeatedExternalRequestCount ?? run.recordsAttempted ?? 0, fieldsAdded: 'phone, countyName, FIPS/provenance when regenerated'})) console.log(`${k}=${v}`);
          NODE

      - name: Write GitHub Actions job summary
        if: ${{ success() }}
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'MD'
          ## CMS Hospital National Build

          Completion declaration: **COMPLETE — NATIONAL CMS HOSPITAL NETWORK BUILT** if this job succeeds and commits generated artifacts.

          | Metric | Value |
          | --- | ---: |
          | Build mode | ${{ steps.summary.outputs.buildMode }} |
          | Pages completed | ${{ steps.summary.outputs.pages }} |
          | Raw rows | ${{ steps.summary.outputs.raw }} |
          | Unique CMS IDs | ${{ steps.summary.outputs.unique }} |
          | Normalized records | ${{ steps.summary.outputs.normalized }} |
          | Duplicate source IDs | ${{ steps.summary.outputs.duplicates }} |
          | Geocoding eligible | ${{ steps.summary.outputs.eligible }} |
          | Cache hits | ${{ steps.summary.outputs.cacheHits }} |
          | Chunks completed/planned | ${{ steps.summary.outputs.chunks }} |
          | Matched / unmatched / failed | ${{ steps.summary.outputs.matched }} / ${{ steps.summary.outputs.unmatched }} / ${{ steps.summary.outputs.failed }} |
          | Geography joined | ${{ steps.summary.outputs.joined }} |
          | Map-ready records | ${{ steps.summary.outputs.mapReady }} |
          | Excluded records | ${{ steps.summary.outputs.excluded }} |
          | States/territories | ${{ steps.summary.outputs.states }} |
          | Partitions | ${{ steps.summary.outputs.partitions }} |
          | Retrieval timestamp | ${{ steps.summary.outputs.retrievedAt }} |
          | Phone present in partitions | ${{ steps.summary.outputs.phone }} |
          | Website present in partitions | ${{ steps.summary.outputs.website }} |
          | Hospital type present | ${{ steps.summary.outputs.hospitalType }} |
          | Ownership present | ${{ steps.summary.outputs.ownership }} |
          | Emergency-services present | ${{ steps.summary.outputs.emergencyServices }} |
          | Critical-access count | ${{ steps.summary.outputs.criticalAccess }} |
          | Fields added to partitions | ${{ steps.summary.outputs.fieldsAdded }} |
          | External geocoding requests | ${{ steps.summary.outputs.externalRequests }} |
          | Pagination complete | ${{ steps.summary.outputs.complete }} |
          | Completion declaration | COMPLETE — NATIONAL CMS HOSPITAL NETWORK BUILT (only after successful job completion) |
          MD

      - name: Commit generated artifacts
        if: ${{ success() && github.event.inputs.commit_generated_artifacts == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add statterrain/data statterrain/docs statterrain/src statterrain/scripts statterrain/package.json .github/workflows/cms-hospital-national-build.yml HANDOFF-v0.3.2.4-NATIONAL-CMS-VALIDATOR-ARTIFACT-RECOVERY.md statterrain/docs/handoffs/HANDOFF-v0.3.2.4-NATIONAL-CMS-VALIDATOR-ARTIFACT-RECOVERY.md
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "data: refresh cms hospital identity fields"
            git push origin HEAD:${{ github.event.inputs.target_branch }}
          fi
