name: County Boundary National Build

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Target generated-data branch
        required: true
        type: string
        default: v0.3.7-county-boundaries-national-data
      boundary_vintage:
        description: Census TIGER vintage
        required: true
        type: string
        default: "2024"
      commit_generated_artifacts:
        description: Commit generated artifacts
        required: true
        type: boolean
        default: true
      auto_merge:
        description: Must remain false
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.target_branch }}
      BOUNDARY_VINTAGE: ${{ inputs.boundary_vintage }}
      COMMIT_GENERATED_ARTIFACTS: ${{ inputs.commit_generated_artifacts }}
      AUTO_MERGE: ${{ inputs.auto_merge }}
      COMMIT_STATUS: not-requested
      PUSH_STATUS: not-requested
    steps:
      - name: Guard inputs
        run: |
          if [ "$AUTO_MERGE" != "false" ]; then
            echo "::error::auto_merge must remain false"
            exit 1
          fi

          if [ "$TARGET_BRANCH" = "main" ] || [ "$TARGET_BRANCH" = "master" ]; then
            echo "::error::Refusing protected branch"
            exit 1
          fi

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: statterrain/package-lock.json

      - name: npm ci
        working-directory: statterrain
        run: npm ci

      - name: Generate boundaries
        working-directory: statterrain
        run: node scripts/public-data/build-county-boundaries.mjs --national --reject-incomplete

      - name: Validate manifest and report
        working-directory: statterrain
        run: |
          node - <<'NODE'
          const manifest = require('./data/generated/county-boundaries/manifest.json');
          const report = require('./data/reports/county-boundary-completeness-v0.3.7.json');
          const ok =
            manifest.validationStatus === 'PASS' &&
            manifest.coverageStatus === 'national' &&
            manifest.partitionCount >= 52 &&
            report.duplicateBoundaryGeoids.length === 0 &&
            report.invalidGeometryCount === 0 &&
            report.missingGeoidCount === 0 &&
            report.acsGeoidsMissingBoundary.length === 0;
          if (!ok) {
            console.error('National county boundary validation failed:', { manifest, report });
            process.exit(1);
          }
          NODE

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: county-boundary-national-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            statterrain/data/generated/county-boundaries/**
            statterrain/data/reports/county-boundary-completeness-v0.3.7.json

      - name: Commit and push when requested
        working-directory: statterrain
        run: |
          if [ "$COMMIT_GENERATED_ARTIFACTS" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              data/generated/county-boundaries/manifest.json \
              data/generated/county-boundaries/states/*.json \
              data/reports/county-boundary-completeness-v0.3.7.json

            git commit -m "data: build national county boundary partitions" || true
            git push origin "$TARGET_BRANCH"
            echo "COMMIT_STATUS=attempted" >> "$GITHUB_ENV"
            echo "PUSH_STATUS=attempted" >> "$GITHUB_ENV"
          fi

      - name: Write final summary
        if: always()
        continue-on-error: true
        working-directory: statterrain
        run: node scripts/public-data/write-county-boundary-workflow-summary.mjs
