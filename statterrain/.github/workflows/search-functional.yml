name: Search functional browser verification
on:
  pull_request:
    paths:
      - 'statterrain/**'
      - '.github/workflows/search-functional.yml'
jobs:
  search-functional:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: statterrain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: statterrain/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- tests/search-functional.spec.ts
